<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RadFlow MFA</title>
  <link rel="stylesheet" href="/static/css/site.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background:
        linear-gradient(135deg, rgba(7,19,58,0.84) 0%, rgba(15,23,36,0.75) 50%, rgba(2,6,23,0.88) 100%),
        url('/static/images/login-bg.png') center center / cover no-repeat;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 360px;
      padding: 28px 24px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    h1 { margin: 0 0 8px; font-size: 24px; font-weight: 500; }
    p { margin: 0 0 18px; color: rgba(255,255,255,0.72); line-height: 1.55; font-size: 14px; }
    label { display: block; color: rgba(255,255,255,0.75); font-size: 12px; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 16px;
      box-sizing: border-box;
      letter-spacing: 0.15em;
      text-align: center;
    }
    input:focus { outline: none; border-color: rgba(255,255,255,0.2); }
    .btn-signin {
      width: 100%;
      padding: 11px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-size: 14px;
      margin-top: 14px;
    }
    .small { display: inline-block; margin-top: 12px; font-size: 12px; color: rgba(255,255,255,0.58); }
    .err { color: #ffb4b4; background: rgba(255,180,180,0.08); padding: 8px 10px; border-radius: 6px; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify Sign-In</h1>
    <p>Enter the 6-digit code from your authenticator app to finish signing in as <strong>{{ username }}</strong>.</p>
    <form method="post" action="/login/mfa">
      <label for="code">Authenticator Code</label>
      <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autofocus placeholder="123456">
      <button type="submit" class="btn-signin">Verify</button>
      <a class="small" href="/login">Back to sign in</a>
      {% if error %}
        <div class="err">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</body>
</html>
