<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RadFlow | Reset Password</title>
  <link rel="stylesheet" href="/static/css/site.css">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow: hidden;
      position: relative;
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(7,19,58,0.80) 0%, rgba(15,23,36,0.68) 50%, rgba(2,6,23,0.86) 100%),
        url('/static/images/login-bg.png') center center / cover no-repeat;
      transform: scale(1.02);
      transform-origin: center;
      pointer-events: none;
      z-index: 0;
    }
    .main-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      padding: 24px 60px;
      box-sizing: border-box;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      gap: 0;
    }
    .corner-logo {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 2;
    }
    .corner-logo img {
      width: 140px;
      max-width: 45vw;
      height: auto;
      border-radius: 24px;
    }
    .left-section {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-right: 48px;
    }
    .app-name {
      margin: 0;
      font-size: 64px;
      line-height: 1.1;
      font-weight: 500;
      color: #ffffff;
    }
    .taglines {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .taglines p {
      margin: 0;
      color: rgba(255,255,255,0.80);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 300;
    }
    .right-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 48px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      padding: 30px 28px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    h2 { color: white; font-size: 22px; margin: 0 0 8px 0; font-weight: 400; }
    .intro-text { color: rgba(255,255,255,0.6); font-size: 12px; margin: 0 0 20px 0; line-height: 1.6; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; color: rgba(255,255,255,0.75); font-size: 12px; margin-bottom: 5px; }
    .form-row input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-row input:focus { outline: none; border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 400;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
    }
    .small { font-size: 12px; color: rgba(255,255,255,0.58); }
    .err {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #fecaca;
      background: rgba(127,29,29,0.20);
      border: 1px solid rgba(248,113,113,0.3);
    }
    .footer-link {
      margin-top: 14px;
      text-align: right;
    }
    .footer-link a {
      color: rgba(255,255,255,0.68);
      text-decoration: none;
      font-size: 12px;
    }
    @media (max-width: 900px) { .left-section { display: none; } }
    @media (max-width: 700px) {
      .corner-logo { top: 16px; left: 16px; }
      .corner-logo img { width: 110px; }
      .main-content {
        align-items: flex-start;
        padding: 88px 14px 18px;
        height: auto;
      }
      .right-section {
        flex: none;
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
        padding: 0;
      }
      .login-card {
        max-width: none;
        width: 100%;
        padding: 20px 16px;
      }
      body { overflow-y: auto; overflow-x: hidden; }
    }
  </style>
</head>
<body>
  <div class="corner-logo">
    <img src="/static/images/logo-light.png" alt="Lumos Lab" onerror="this.style.display='none'">
  </div>
  <div class="main-content">
    <div class="left-section">
      <h1 class="app-name">RadFlow</h1>
      <div class="taglines">
        <p>Set a new password using your secure one-time reset link.</p>
        <p>Reset links expire automatically and can only be used once.</p>
      </div>
    </div>
    <div class="right-section">
      <div class="login-card">
        <h2>Reset Password</h2>
        <p class="intro-text">Enter a new password for your account. Use at least 8 characters.</p>
        <form method="post" action="/reset-password">
          <input type="hidden" name="token" value="{{ token }}">

          <div class="form-row">
            <label for="password">New password</label>
            <input id="password" name="password" type="password" required>
          </div>
          <div class="form-row">
            <label for="confirm_password">Confirm new password</label>
            <input id="confirm_password" name="confirm_password" type="password" required>
          </div>

          <button class="btn-primary" type="submit">Update password</button>

          {% if error %}
            <div class="err">{{ error }}</div>
          {% endif %}
        </form>

        <div class="footer-link">
          <a href="/">Back to sign in</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
