name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Compile app
        run: python -m py_compile app/main.py

      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        continue-on-error: true
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=15 -v
        env:
          APP_SECRET: test-secret-for-ci
          DATABASE_URL: sqlite:///./test.db
          APP_BASE_URL: http://localhost:8000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Manual approval gate ─────────────────────────────────────────────────────
  # To enable this: go to Settings → Environments → create "production"
  # → add yourself as a required reviewer.
  # GitHub will pause here and email you to approve before deploying.
  approve:
    name: Wait for approval
    runs-on: ubuntu-latest
    needs: ci
    environment: production  # <-- triggers the approval gate

    steps:
      - name: Approval granted
        run: echo "Production deploy approved — proceeding."

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: approve  # only runs after manual approval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: lumosradflow-prod
          package: .

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to start
        run: sleep 30

      - name: Check app is responding
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://lumosradflow-prod-etatbqb6b3fzbvd2.ukwest-01.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — app returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production smoke test failed after deploy."
          echo "Check Azure portal: https://portal.azure.com"
          echo "Consider rolling back via Azure App Service deployment slots."
