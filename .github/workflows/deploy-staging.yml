name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Compile app
        run: python -m py_compile app/main.py

      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        continue-on-error: true
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=70 -v
        env:
          APP_SECRET: test-secret-for-ci
          DATABASE_URL: sqlite:///./test.db
          APP_BASE_URL: http://localhost:8000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: ci  # only runs if CI passes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: lumosradflow-staging
          package: .

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy  # runs after deploy completes

    steps:
      - name: Wait for app to start
        run: sleep 20

      - name: Check app is responding
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://lumosradflow-staging.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — app returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
